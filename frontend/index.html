<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Simp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Group Name</h1>
        <div class="header-actions">
            <button id="profileBtn" title="User Profile">U</button>
        </div>
    </header>

    <main>
        <section class="summary-card">
            <h2>Balances</h2>
            <p class="balance positive-balance">You are owed: $0.00</p>
        </section>

        <section class="expense-list-container">
            <h3>Recent Expenses</h3>
            <ul id="expenseList">
                <li class="empty-state">No expenses yet.</li>
            </ul>
        </section>
    </main>

    <button id="addExpenseBtn" class="fab">+</button>

    <div id="expenseModal" class="modal hidden">
        <div class="modal-header">
            <button id="closeModalBtn" class="icon-btn">&times;</button>
            <h2 id="modalTitle">Add Expense</h2>
            <div class="header-actions-modal">
                <button id="deleteExpenseBtn" class="icon-btn danger-btn hidden">🗑️</button>
                <button id="saveExpenseBtn" class="text-btn">Save</button>
            </div>
        </div>

        <div class="modal-body">
            <form id="expenseForm">

                <div class="input-group">
                    <label for="description">For what?</label>
                    <input type="text" id="description" class="form-control" placeholder="e.g. Dinner, Taxi..." required>
                </div>

                <div class="input-group">
                    <div class="input-group payers-group">
                    <label>Who paid & How much?</label>
                    <div class="payers-summary" id="payersSummary">Total Paid: $0.00 ▼</div>
                    <div class="payers-list hidden" id="payersList">
                        </div>
                </div>

                <div class="input-group blocks-container">
                    <div class="blocks-header">
                        <label>Split Details</label>
                        <span id="blockCount" class="block-count">1/8</span>
                    </div>
                    <div id="splitBlocksWrapper">
                        <div class="split-block" data-block-id="1">
                            <div class="block-top">
                                <input type="text" class="form-control block-name-input" placeholder="Item name (optional)">
                                
                                <input type="number" class="form-control block-amount-input" placeholder="Total $" style="width: 80px;">
                                
                                <select class="form-control block-mode-select">
                                    <option value="shares">By Shares</option>
                                    <option value="amount">By Amount</option>
                                </select>
                                <button type="button" class="icon-btn delete-block-btn hidden">&times;</button>
                            </div>
                            
                            <div class="block-members">
                                </div>
                        </div>
                    </div>
                    <button type="button" id="addBlockBtn" class="text-btn add-block-btn">+ Add Block</button>
                    </div>
                </div>

                <div class="input-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
