<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Simp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Group Name</h1>
        <div class="header-actions">
            <button id="profileBtn" title="User Profile">U</button>
        </div>
    </header>

    <main>
        <section class="summary-card">
            <h2>Balances</h2>
            <p class="balance positive-balance">You are owed: $0.00</p>
        </section>

        <section class="expense-list-container">
            <h3>Recent Expenses</h3>
            <ul id="expenseList">
                <li class="empty-state">No expenses yet.</li>
            </ul>
        </section>
    </main>

    <button id="addExpenseBtn" class="fab">+</button>

    <div id="expenseModal" class="modal hidden">
        <div class="modal-header">
            <button id="closeModalBtn" class="icon-btn">&times;</button>
            <h2 id="modalTitle">Add Expense</h2>
            <div class="header-actions-modal">
                <button id="deleteExpenseBtn" class="icon-btn danger-btn hidden">🗑️</button>
                <button id="saveExpenseBtn" class="text-btn">Save</button>
            </div>
        </div>

        <div class="modal-body">
            <form id="expenseForm">
                <div class="input-group">
                    <label for="payer">Who paid?</label>
                    <select id="payer" class="form-control">
                        <option value="user1">You</option>
                        <option value="user2">Alice</option>
                        <option value="user3">Bob</option>
                    </select>
                    
                    <div class="input-group split-group">
                    <label>Split among</label>
                    <div class="member-list" id="splitMemberList">
                        </div>
                    </div>
                </div>

                <div class="input-group amount-group">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="amount" class="form-control amount-input" placeholder="0.00" step="0.01" required>
                </div>

                <div class="input-group">
                    <label for="description">For what?</label>
                    <input type="text" id="description" class="form-control" placeholder="e.g. Dinner, Taxi..." required>
                </div>

                <div class="input-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
